<script>
  (function () {
    const menuToggle = document.getElementById("menuToggle");
    const mobileMenu = document.getElementById("mobileMenu");
    const iconOpen = document.getElementById("menuIconOpen");
    const iconClose = document.getElementById("menuIconClose");

    function closeMenu() {
      mobileMenu && mobileMenu.classList.remove("is-open");
      menuToggle && menuToggle.setAttribute("aria-expanded", "false");
      iconOpen && iconOpen.classList.remove("hidden");
      iconClose && iconClose.classList.add("hidden");
    }

    if (menuToggle && mobileMenu) {
      menuToggle.addEventListener("click", function () {
        const isOpen = mobileMenu.classList.toggle("is-open");
        menuToggle.setAttribute("aria-expanded", String(isOpen));
        iconOpen.classList.toggle("hidden", isOpen);
        iconClose.classList.toggle("hidden", !isOpen);
      });

      mobileMenu
        .querySelectorAll("a")
        .forEach((a) => a.addEventListener("click", closeMenu));
    }

    document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
      anchor.addEventListener("click", function (e) {
        const target = document.querySelector(this.getAttribute("href"));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: "smooth" });
        }
      });
    });

    document.querySelectorAll(".faq-q").forEach((btn) => {
      btn.addEventListener("click", () => {
        const item = btn.closest(".faq-item");
        const answer = item ? item.querySelector(".faq-a") : null;
        const icon = btn.querySelector(".material-symbols-outlined");

        if (!answer) return;

        answer.classList.toggle("hidden");
        if (icon)
          icon.textContent = answer.classList.contains("hidden")
            ? "add"
            : "remove";
      });
    });

    const serviceMap = {
      ads: "ads",
      "social-management": "social-management",
      "content-design": "content-design",
      "landing-page": "landing-page",
      "company-website": "company-website",
      "ai-agent": "ai-agent",
      "social-management": "social-management",
      "custom-system": "custom-system",
      "lawyer-system": "lawyer-system",
      resumeiq: "resumeiq",
      "smart-attendance": "smart-attendance",
      "university-projects": "university-projects",
    };

    document.querySelectorAll(".js-service-cta").forEach((link) => {
      link.addEventListener("click", () => {
        const value = serviceMap[link.dataset.service];
        const input = document.getElementById("serviceInput");
        const label = document.getElementById("serviceSelectText");
        const option = document.querySelector(
          `.aqua-select-option[data-value="${value}"]`,
        );

        if (!value || !input) return;

        input.value = value;
        input.dispatchEvent(new Event("change", { bubbles: true }));

        document
          .querySelectorAll(
            '[data-aqua-select="service"] .aqua-select-option.is-selected',
          )
          .forEach((item) => item.classList.remove("is-selected"));

        option?.classList.add("is-selected");

        if (label) {
          label.textContent = option?.textContent.trim() || value;
          label.removeAttribute("data-i18n");
        }
      });
    });

    const consent = localStorage.getItem("aqua_analytics_consent");
    const banner = document.getElementById("consent-banner");

    if (banner && consent === null) {
      setTimeout(() => banner.classList.add("is-visible"), 900);
    }

    document.getElementById("consentAccept")?.addEventListener("click", () => {
      banner?.classList.remove("is-visible");
      window.__aquaEnableAnalytics?.();
    });

    document.getElementById("consentDecline")?.addEventListener("click", () => {
      banner?.classList.remove("is-visible");
      window.__aquaDeclineAnalytics?.();
    });

    document
      .getElementById("successModalClose")
      ?.addEventListener("click", () => {
        document.getElementById("successModal")?.classList.remove("is-open");
      });
  })();
</script>
<script src="/js/aquatech-contact-client.js" defer></script>
<script defer src="./js/site-i18n.js"></script>
<script defer src="./js/form.js"></script>
